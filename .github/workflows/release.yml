name: Build & Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    name: Bundle & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build userscript bundle
        run: npm run build

      - name: Verify dist output
        run: |
          if [ ! -f dist/telegram-web-translator-pro.user.js ]; then
            echo "ERROR: dist file not found!"
            exit 1
          fi
          BYTES=$(wc -c < dist/telegram-web-translator-pro.user.js)
          echo "Bundle size: $BYTES bytes"
          if [ "$BYTES" -lt 1000 ]; then
            echo "ERROR: Bundle is suspiciously small ($BYTES bytes)"
            exit 1
          fi

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          # Extract the section for this version from CHANGELOG.md
          NOTES=$(awk "/^## \\[$VERSION\\]/,/^## \\[/" CHANGELOG.md | head -n -1 | tail -n +2)
          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for details."
          fi
          # Write to file to handle multiline
          echo "$NOTES" > /tmp/release_notes.md
          echo "NOTES_FILE=/tmp/release_notes.md" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: telegram-web-translator-pro ${{ github.ref_name }}
          body_path: ${{ steps.changelog.outputs.NOTES_FILE }}
          files: dist/telegram-web-translator-pro.user.js
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
