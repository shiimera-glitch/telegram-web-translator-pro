name: Build & Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    name: Bundle & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build userscript bundle
        run: npm run build

      - name: Verify dist output
        run: |
          DIST=dist/TelegramWebTranslatorPro.user.js
          if [ ! -f "$DIST" ]; then
            echo "ERROR: dist file not found: $DIST"
            ls -la dist/ || true
            exit 1
          fi
          BYTES=$(wc -c < "$DIST")
          if [ "$BYTES" -lt 1000 ]; then
            echo "ERROR: dist file too small ($BYTES bytes)"
            exit 1
          fi
          echo "Bundle verified: $BYTES bytes"

      - name: Extract version from tag
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION=${{ steps.ver.outputs.VERSION }}
          awk "/^## \[?${VERSION}\]?/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md \
            > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "No changelog entry found for $VERSION — using generic notes."
            echo "Release $VERSION" > /tmp/release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: /tmp/release-notes.md
          files: dist/TelegramWebTranslatorPro.user.js
          token: ${{ secrets.GITHUB_TOKEN }}
