name: PR Quality Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint
        continue-on-error: false

      - name: Build userscript
        run: npm run build

      - name: Verify dist output
        run: |
          if [ ! -f dist/TelegramWebTranslatorPro.user.js ]; then
            echo "ERROR: dist file not found after build!"
            exit 1
          fi
          echo "Build verified: dist/TelegramWebTranslatorPro.user.js exists"
