name: PR Quality Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint
        continue-on-error: false

      - name: Build userscript
        run: npm run build

      - name: Verify dist output exists
        run: |
          if [ ! -f dist/telegram-web-translator-pro.user.js ]; then
            echo "ERROR: dist file not found after build!"
            exit 1
          fi
          echo "Build artifact: $(wc -c < dist/telegram-web-translator-pro.user.js) bytes"

      - name: Check version consistency
        run: |
          VER_HEADER=$(grep '@version' src/00-header.js | grep -oP '[\d]+\.[\d]+\.[\d]+')
          VER_CONST=$(grep "VER = '" src/01-constants.js | grep -oP "'[^']+'" | tr -d "'")
          VER_INIT=$(grep "booting v" src/20-init.js | grep -oP 'v[\d.]+' | tr -d 'v')
          echo "Header: $VER_HEADER | Constants: $VER_CONST | Init: $VER_INIT"
          if [ "$VER_HEADER" != "$VER_CONST" ] || [ "$VER_HEADER" != "$VER_INIT" ]; then
            echo "ERROR: Version mismatch across files!"
            exit 1
          fi
          echo "All version strings match: $VER_HEADER"
